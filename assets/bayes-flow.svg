<svg width="1100" height="360" viewBox="0 0 1100 360" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Naive Bayes text classification flow</title>
  <desc id="desc">Text is tokenized, converted to bag-of-words features, scored by Bayes probabilities, and classified.</desc>
  <rect width="1100" height="360" rx="28" fill="#F8FAFC"/>
  <g font-family="Arial, 'PingFang SC', sans-serif">
    <text x="50" y="60" font-size="28" font-weight="800" fill="#0F172A">朴素贝叶斯如何判断一句话</text>
    <text x="50" y="96" font-size="18" fill="#475569">把文本拆成词，再用每个词在不同类别下的概率累加证据。</text>
  </g>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2 2L10 6L2 10" fill="#64748B"/>
    </marker>
  </defs>
  <g font-family="Arial, 'PingFang SC', sans-serif">
    <rect x="70" y="150" width="190" height="118" rx="18" fill="white" stroke="#CBD5E1"/>
    <text x="100" y="190" font-size="22" font-weight="800" fill="#0F172A">文本输入</text>
    <text x="100" y="226" font-size="18" fill="#475569">剧情 很 精彩</text>

    <line x1="282" y1="209" x2="360" y2="209" stroke="#64748B" stroke-width="3" marker-end="url(#arrow)"/>

    <rect x="380" y="150" width="190" height="118" rx="18" fill="white" stroke="#CBD5E1"/>
    <text x="410" y="190" font-size="22" font-weight="800" fill="#0F172A">词袋特征</text>
    <text x="410" y="226" font-size="18" fill="#475569">精彩: 1</text>
    <text x="410" y="252" font-size="18" fill="#475569">剧情: 1</text>

    <line x1="592" y1="209" x2="670" y2="209" stroke="#64748B" stroke-width="3" marker-end="url(#arrow)"/>

    <rect x="690" y="132" width="210" height="154" rx="18" fill="#111827"/>
    <text x="724" y="174" font-size="22" font-weight="800" fill="#F8FAFC">概率打分</text>
    <text x="724" y="212" font-size="17" fill="#CBD5E1">先验 P(类别)</text>
    <text x="724" y="242" font-size="17" fill="#CBD5E1">条件 P(词|类别)</text>

    <line x1="922" y1="209" x2="1000" y2="209" stroke="#64748B" stroke-width="3" marker-end="url(#arrow)"/>

    <rect x="1008" y="158" width="54" height="102" rx="16" fill="#2563EB"/>
    <text x="982" y="316" font-size="22" font-weight="800" fill="#0F172A">输出类别</text>
    <text x="995" y="345" font-size="18" fill="#2563EB">positive</text>
  </g>
</svg>
